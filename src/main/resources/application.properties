# src/main/resources/application.properties
spring.application.name=dataSpace

# 当前激活的运行环境配置，可选：dm、dev（默认 dm）
spring.profiles.active=dm

# 服务端口
server.port=7788

seatunnel.home=${SEATUNNEL_HOME:}
seatunnel.work-dir=${SEATUNNEL_WORK_DIR:${user.dir}/data/seatunnel}
seatunnel.exec-mode=${SEATUNNEL_EXEC_MODE:local}
seatunnel.cluster-name=${SEATUNNEL_CLUSTER_NAME:seatunnel}
seatunnel.client-address=${SEATUNNEL_CLIENT_ADDRESS:localhost:5801}

# Auth and session related defaults
security.jwt.refresh_ttl=604800
security.jwt.expire-seconds=3600

# Redis服务配置
spring.redis.host=localhost
spring.redis.port=6379

# Cookie flags
auth.cookie.secure=false
auth.cookie.samesite=Lax

