# src/main/resources/application.properties
spring.application.name=dataSpace

# 当前激活的运行环境配置，可选：dm、dev（默认 dm）
spring.profiles.active=dm

# 服务端口
server.port=7788

seatunnel.home=${SEATUNNEL_HOME:}
seatunnel.work-dir=${SEATUNNEL_WORK_DIR:${user.dir}/data/seatunnel}
seatunnel.exec-mode=${SEATUNNEL_EXEC_MODE:local}
seatunnel.cluster-name=${SEATUNNEL_CLUSTER_NAME:seatunnel}
seatunnel.client-address=${SEATUNNEL_CLIENT_ADDRESS:localhost:5801}

# Auth and session related defaults
security.jwt.refresh_ttl=604800
security.jwt.expire-seconds=3600

# Redis服务配置
spring.redis.host=localhost
spring.redis.port=6379

# Cookie flags
auth.cookie.secure=false
auth.cookie.samesite=Lax

# 文件平台配置（支持通过环境变量覆盖）
file.storage.workspace=${FILE_STORAGE_WORKSPACE:${user.dir}/data/file-platform}
file.storage.chunk-dir=${FILE_STORAGE_CHUNK_DIR:chunks}
file.storage.object-dir=${FILE_STORAGE_OBJECT_DIR:objects}
# 32字节主密钥的Base64，仅示例值，生产请改为安全注入
file.storage.master-key-base64=${FILE_STORAGE_MASTER_KEY_BASE64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}

# multipart 上传限制（需高于前端10MB分片，预留表单边界开销）
spring.servlet.multipart.max-file-size=${SPRING_MULTIPART_MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${SPRING_MULTIPART_MAX_REQUEST_SIZE:20MB}

# 驱动jar目录（用于按数据源动态加载 JDBC 驱动），默认放在项目根目录下的 drivers 文件夹
# 可以通过环境变量 DRIVERS_DIR 覆盖，例如在 Windows PowerShell 中：$env:DRIVERS_DIR='D:\driver-jars'
drivers.dir=${DRIVERS_DIR:${user.dir}/drivers}

