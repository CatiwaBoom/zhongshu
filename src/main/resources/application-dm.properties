# src/main/resources/application-dm.properties
# DM 数据源配置
spring.datasource.driver-class-name=dm.jdbc.driver.DmDriver

# 数据库连接地址（默认 schema=data_space，可按需修改）
spring.datasource.url=${DM_URL:jdbc:dm://127.0.0.1:5236?schema=data_space}

# 数据库用户名（可通过环境变量覆盖）
spring.datasource.username=${DM_USERNAME:SYSDBA}

# 数据库密码（可通过环境变量覆盖）
spring.datasource.password=${DM_PASSWORD:SYSDBA@root.123}

# Hikari 连接池参数
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# Flyway 配置
spring.flyway.enabled=true

# 迁移脚本路径（默认 classpath:db/migration）
spring.flyway.locations=classpath:db/migration

# 已有库首次接入迁移时，启用 baseline 避免历史脚本冲突
spring.flyway.baseline-on-migrate=true